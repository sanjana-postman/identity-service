openapi: 3.0.0
info:
  title: Identity Service API
  version: 1.0.0
  description: In-memory identity/user management API

servers:
  - url: http://localhost:3001

paths:
  /users:
    post:
      summary: Create or retrieve a user
      operationId: createOrRetrieveUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: New user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewUserResponse'
        '200':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistingUserResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

    get:
      summary: List all users
      operationId: listUsers
      tags:
        - Users
      responses:
        '200':
          description: A list of all users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          description: The user ID (e.g. u1, u2)
          schema:
            $ref: '#/components/schemas/UserIdParam'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: u1
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    CreateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    NewUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    ExistingUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        existing:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: name and email are required

    UsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    UserIdParam:
      type: string
      example: u1

    UserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: identity-api

    InternalServerError:
      type: object
      properties:
        error:
          type: string
          example: internal server error