$kind: http-example
request:
  url: http://{{baseUrl}}:/users/:id#
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: id
      value: u1
      description: The user ID (e.g. u1, u2)
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "user": {
          "id": "u1",
          "name": "Alice",
          "email": "alice@example.com"
        }
      }
order: 1000
