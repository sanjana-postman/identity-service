$kind: http-example
request:
  url: http://{{baseUrl}}/users
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "Alice",
        "email": "alice@example.com"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "internal server error"
      }
order: 4000
