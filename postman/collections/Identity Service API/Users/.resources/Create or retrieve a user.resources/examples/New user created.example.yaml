$kind: http-example
request:
  url: http://{{baseUrl}}/users
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "Alice",
        "email": "alice@example.com"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "user": {
          "id": "u1",
          "name": "Alice",
          "email": "alice@example.com"
        }
      }
order: 2000
